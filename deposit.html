<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Realizar Depósito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="menu.html">
                <i class="bi bi-wallet2"></i> Alke Wallet
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">Menú Principal</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="transactions.html">Movimientos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <!-- Header -->
                <div class="mb-5">
                    <h2 class="mb-2">Realizar Depósito</h2>
                    <p class="text-muted">Agrega fondos a tu cuenta de manera rápida y segura</p>
                </div>

                <!-- Current Balance Card -->
                <div class="card bg-primary text-white mb-4">
                    <div class="card-body p-4">
                        <p class="card-text mb-1">Saldo Actual</p>
                        <h3 class="mb-0" id="currentBalance">CLP $0</h3>
                    </div>
                </div>

                <!-- Deposit Form -->
                <div class="card shadow-lg">
                    <div class="card-body p-5">
                        <form id="depositForm">
                            <div class="mb-4">
                                <label for="depositAmount" class="form-label">Monto a Depositar (CLP)</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text">CLP $</span>
                                    <input 
                                        type="number" 
                                        class="form-control" 
                                        id="depositAmount" 
                                        name="depositAmount"
                                        placeholder="1000"
                                        step="1"
                                        min="1"
                                        max="100000000"
                                        required
                                    >
                                </div>
                                <small class="text-danger d-none" id="amountError"></small>
                            </div>

                            <div class="mb-4">
                                <label for="paymentMethod" class="form-label">Método de Pago</label>
                                <select class="form-select form-select-lg" id="paymentMethod" name="paymentMethod" required>
                                    <option value="">Selecciona un método...</option>
                                    <option value="credit_card">Tarjeta de Crédito</option>
                                    <option value="debit_card">Tarjeta de Débito</option>
                                    <option value="bank_transfer">Transferencia Bancaria</option>
                                    <option value="digital_wallet">Billetera Digital</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label for="depositDescription" class="form-label">Descripción (Opcional)</label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="depositDescription" 
                                    name="depositDescription"
                                    placeholder="Ej: Depósito de nómina"
                                >
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success btn-lg">
                                    <i class="bi bi-check-circle"></i> Confirmar Depósito
                                </button>
                                <a href="menu.html" class="btn btn-outline-secondary btn-lg">
                                    Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Success Message -->
                <div id="successMessage" class="alert alert-success alert-dismissible fade d-none mt-4" role="alert">
                    <i class="bi bi-check-circle"></i>
                    <span id="successText">¡Depósito realizado exitosamente!</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="alert alert-danger alert-dismissible fade d-none mt-4" role="alert">
                    <i class="bi bi-exclamation-circle"></i>
                    <span id="errorText">Ocurrió un error al procesar el depósito</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../js/deposit.js"></script>
</body>
</html>
